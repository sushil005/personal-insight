{% extends "base.html" %}
{% block title %}Edit Log{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg p-4 mx-auto border-0" style="max-width: 520px;">
        <h2 class="text-center mb-4">Edit Log</h2>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Study Hours</label>
                <input type="number" min="0" max="24" step="0.1" name="study" class="form-control" value="{{ log[0] }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Screen Time</label>
                <input type="number" min="0" max="24" step="0.1" name="screen" class="form-control" value="{{ log[1] }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Sleep Hours</label>
                <input type="number" min="0" max="24" step="0.1" name="sleep" class="form-control" value="{{ log[2] }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Mood</label>
                <select name="mood" class="form-select" required>
                    {% for mood in moods %}
                        <option value="{{ mood }}" {% if log[3] == mood %}selected{% endif %}>{{ mood }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2">Update Log</button>
        </form>

        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary mt-3 w-100">
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
